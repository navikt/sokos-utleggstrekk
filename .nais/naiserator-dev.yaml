apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: sokos-utleggstrekk
  namespace: okonomi
  labels:
    team: okonomi
spec:
  ingresses:
    - https://sokos-utleggstrekk.intern.dev.nav.no
  image: {{image}}
  port: 8080
  replicas:
    max: 1
    min: 1
  webproxy: true
  resources:
    limits:
      cpu: 2000m
      memory: 12Gi
    requests:
      cpu: 500m
      memory: 512Mi
  azure:
    application:
      enabled: true
      allowAllUsers: false
  maskinporten:
    enabled: true
    scopes:
      consumes:
        - name: skatteetaten:utleggstrekkformidling
  vault:
    enabled: true
