name: Deploy application

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENCE'
      - 'CODEOWNERS'
      - '.gitignore'
      - '.editorconfig'
      - 'setupLocalEnvironment.sh'
      - '.scripts'
      - 'dokumentasjon/**'
      - '.github/workflows/build-pr.yaml'
      - '.github/workflows/codeql-scan.yaml'
      - '.github/workflows/digestabot-automerge.yaml'
      - '.github/workflows/digestabot-update.yaml'
      - '.github/workflows/manual-deploy.yaml'
      - '.github/workflows/unleash.yaml'
      - '.github/dependabot.yaml'

env:
  TZ: Europe/Oslo

jobs:
  build-and-test:
    permissions:
      contents: read
    name: Build and test
    uses: navikt/mob-gha-workflows/.github/workflows/gradle-build-test-app.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/gradle-build-test-app.yaml@v1.0.0
    with:
      upload-artifact: true

  dependency-submission:
    permissions:
      contents: write
    name: Submit dependency graph
    uses: navikt/mob-gha-workflows/.github/workflows/gradle-dependency-submission.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/gradle-dependency-submission.yaml@v1.0.0

  build-push-image-dev:
    permissions:
      contents: read
      id-token: write
    needs: [build-and-test]
    name: Build push dev image
    uses: navikt/mob-gha-workflows/.github/workflows/gradle-build-push-image.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/gradle-build-push-image.yaml@v1.0.0
    secrets: inherit
    with:
      image-suffix: "dev"
      dockerfile: "./.nais/dev/Dockerfile"
      use-artifact: true

  build-push-image-prod:
    permissions:
      contents: read
      id-token: write
    needs: [build-and-test]
    name: Build push prod image
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: navikt/mob-gha-workflows/.github/workflows/gradle-build-push-image.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/gradle-build-push-image.yaml@v1.0.0
    secrets: inherit
    with:
      dockerfile: "./.nais/prod/Dockerfile"
      use-artifact: true

  deploy-dev:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      deployments: write
    needs: [build-push-image-dev]
    name: Deploy to dev-gcp
    uses: navikt/mob-gha-workflows/.github/workflows/nais-deploy.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/nais-deploy.yaml@v1.0.0
    with:
      cluster: dev-gcp
      resource: .nais/dev/naiserator-dev.yaml
      image: ${{ needs.build-push-image-dev.outputs.image }}

  deploy-prod:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      deployments: write
    needs: [build-push-image-prod, deploy-dev]
    name: Deploy to prod-gcp
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: navikt/mob-gha-workflows/.github/workflows/nais-deploy.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/nais-deploy.yaml@v1.0.0
    with:
      cluster: prod-gcp
      resource: .nais/prod/naiserator-prod.yaml
      image: ${{ needs.build-push-image-prod.outputs.image }}
