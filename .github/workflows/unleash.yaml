name: Deploy Unleash

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/unleash.yaml'
      - '.nais/dev/unleash-dev.yaml'
      - '.nais/dev/unleash-prod.yaml'

env:
  TZ: Europe/Oslo

jobs:
  deploy-dev:
    permissions:
      id-token: write
      contents: read
    name: Deploy to dev-gcp
    uses: navikt/mob-gha-workflows/.github/workflows/unleash-deploy.yaml@main
    with:
      cluster: dev-gcp
      resource: .nais/dev/unleash-dev.yaml

  deploy-prod:
    permissions:
      id-token: write
      contents: read
    name: Deploy to prod-gcp
    uses: navikt/mob-gha-workflows/.github/workflows/unleash-deploy.yaml@main
    with:
      cluster: prod-gcp
      resource: .nais/prod/unleash-prod.yaml