include file("defaults.properties")

ktor {
  environment = local
}

application {
  appName = "sokos-utleggstrekk"
  appName = ${?NAIS_APP_NAME}
  namespace = okonomi
  naisPodName = "local-no-pod"
  naisPodName = ${?NAIS_POD_NAME}

  scheduler {
    isActive = true
  }
}

maskinportenClientConfig {
  clientId = ${MASKINPORTEN_CLIENT_ID}
  wellKnownUrl = ${MASKINPORTEN_WELL_KNOWN_URL}
  scopes = ${MASKINPORTEN_SCOPES}
  rsaKeyString = ${MASKINPORTEN_CLIENT_JWK}
}

mqProperties {
  username = ${MQ_USERNAME}
  password = ${MQ_PASSWORD}
  userAuth = true
}

postgresConfig {
  host = ${POSTGRES_HOST}
  port = ${POSTGRES_PORT}
  username = ${POSTGRES_USERNAME}
  password = ${POSTGRES_PASSWORD}
  jdbcUrl = ${POSTGRES_JDBC_URL}
  user = ${POSTGRES_USERNAME}
  name = "sokos-utleggstrekk"
}

slackConfig {
  url = ${SOKOS_UTLEGGSTREKK_SLACK_WEBHOOK_URL}
}

unleashProperties {
  unleashApi = ${?UNLEASH_SERVER_API_URL}
  apiKey = ${?UNLEASH_SERVER_API_TOKEN}
  environment = ${?UNLEASH_SERVER_API_ENV}
  enabled = true
}